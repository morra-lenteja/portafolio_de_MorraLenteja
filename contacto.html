  <!-- CONTACT FORM -->
  <section class="contact-page-section">
    <div class="contact-page-container">
      <div class="contact-page-header">
        <h1 class="contact-page-title">Contáctame</h1>
        <div class="title-underline"></div>
        <p class="contact-page-desc">¿Tienes un proyecto en mente? Estoy lista para hacerlo realidad.</p>
      </div>
      <form class="contact-form" action="#" method="POST">
        <div class="form-group">
          <label for="name" class="form-label">Nombre</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label for="subject" class="form-label">Asunto</label>
          <input type="text" id="subject" name="subject" class="form-input" placeholder="¿De qué se trata?">
        </div>
        <div class="form-group">
          <label for="message" class="form-label">Mensaje</label>
          <textarea id="message" name="message" class="form-textarea" rows="6" placeholder="Cuéntame sobre tu proyecto..." required></textarea>
        </div>
        <button type="submit" class="btn-gothic btn-submit">Enviar Mensaje</button>
      </form>
    </div>
  </section>
